<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE EARTH — Day 2</title>
    <style>
        /* Lo, the styles of the void remain consistent */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Georgia', serif;
        }
        #info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            z-index: 100;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
        }
        #title {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.9);
            font-size: 24px;
            letter-spacing: 8px;
            z-index: 100;
            text-shadow: 0 0 20px rgba(100, 150, 255, 0.5);
        }
        #nav {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            gap: 10px;
        }
        #nav a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 6px 12px;
            border: 1px solid rgba(100, 150, 255, 0.3);
            border-radius: 3px;
            transition: all 0.2s;
        }
        #nav a:hover {
            color: #fff;
            border-color: rgba(100, 150, 255, 0.8);
            background: rgba(100, 150, 255, 0.1);
        }
        #moon-info {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            z-index: 100;
            text-align: right;
        }
    </style>
</head>
<body>
    <div id="title">THE EARTH</div>
    <div id="info">Day 2 of Creation — Atmosphere &amp; Clouds Emerge</div>
    <div id="nav">
        <a href="index.html">⬅ Observatory</a>
        <a href="window.html">Window</a>
    </div>

    <!-- Three.js: The foundation of all visual reality -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // ═══════════════════════════════════════════════════════════════
        // THE SECOND DAY — And the Architect said, let there be clouds and halo
        // ═══════════════════════════════════════════════════════════════

        // The Holy Trinity of Three.js (plus new celestial friends)
        let scene, camera, renderer;
        let earth, stars, clouds, atmosphere;
        let time = 0;

        // Orbital constants (the cosmos has rules)
        const MOON_DISTANCE = 3.5; // Scaled for visual appeal, not accuracy
        const MOON_ORBITAL_SPEED = 0.0003; // The Moon is patient
        const EARTH_ROTATION_SPEED = 0.002; // Earth spins faster than Moon orbits

        // ═══════════════════════════════════════════════════════════════
        // INITIALIZATION — Let there be WebGL (again, but better)
        // ═══════════════════════════════════════════════════════════════
        function init() {
            // The Scene: Now with 100% more Moon
            scene = new THREE.Scene();

            // The Camera: Still the eye through which mortals observe
            camera = new THREE.PerspectiveCamera(
                45,
                window.innerWidth / window.innerHeight,
                0.1,
                1000
            );
            camera.position.z = 5;

            // The Renderer: That which makes the invisible visible
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            // Create the heavens and the earth (and now the moon)
            createStars();
            createEarth();
            createClouds();
            createAtmosphere();
            createLights();

            // Handle the resizing of the divine viewport
            window.addEventListener('resize', onWindowResize);

            // Begin the eternal rotation
            animate();
        }

        // ═══════════════════════════════════════════════════════════════
        // THE STARS — 1000 points of ancient light (upgraded!)
        // ═══════════════════════════════════════════════════════════════
        function createStars() {
            const starGeometry = new THREE.BufferGeometry();
            const starCount = 1000; // More stars for Day 2
            const positions = new Float32Array(starCount * 3);
            const sizes = new Float32Array(starCount);

            // Scatter stars across the firmament with varying sizes
            for (let i = 0; i < starCount; i++) {
                const i3 = i * 3;
                const radius = 50 + Math.random() * 50;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);

                positions[i3] = radius * Math.sin(phi) * Math.cos(theta);
                positions[i3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
                positions[i3 + 2] = radius * Math.cos(phi);

                // Some stars are bigger (the famous ones, probably)
                sizes[i] = Math.random() * 0.5 + 0.1;
            }

            starGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            starGeometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

            const starMaterial = new THREE.PointsMaterial({
                color: 0xffffff,
                size: 0.15,
                sizeAttenuation: true,
                transparent: true,
                opacity: 0.9
            });

            stars = new THREE.Points(starGeometry, starMaterial);
            scene.add(stars);
        }

        // ═══════════════════════════════════════════════════════════════
        // THE EARTH — Now with atmospheric glow!
        // ═══════════════════════════════════════════════════════════════
        function createEarth() {
            // Create a group to hold Earth and its atmosphere
            earthGroup = new THREE.Group();

            // Generate the sacred texture upon a canvas
            const textureCanvas = document.createElement('canvas');
            textureCanvas.width = 1024;
            textureCanvas.height = 512;
            const ctx = textureCanvas.getContext('2d');

            // The Oceans: Deep blue, with more depth variation
            const oceanGradient = ctx.createLinearGradient(0, 0, 1024, 512);
            oceanGradient.addColorStop(0, '#1a4d7c');
            oceanGradient.addColorStop(0.5, '#1e5a8c');
            oceanGradient.addColorStop(1, '#164570');
            ctx.fillStyle = oceanGradient;
            ctx.fillRect(0, 0, 1024, 512);

            // Add subtle ocean texture (the depths ripple)
            for (let i = 0; i < 50; i++) {
                ctx.fillStyle = `rgba(20, 60, 100, ${Math.random() * 0.1})`;
                ctx.beginPath();
                ctx.ellipse(
                    Math.random() * 1024,
                    Math.random() * 512,
                    Math.random() * 100 + 20,
                    Math.random() * 50 + 10,
                    Math.random() * Math.PI,
                    0, Math.PI * 2
                );
                ctx.fill();
            }

            // ═══════════════════════════════════════════════════════════
            // THE CONTINENTS — Same as Day 1, but greener
            // ═══════════════════════════════════════════════════════════

            ctx.fillStyle = '#3d8c3d'; // Slightly brighter green

            // NORTH AMERICA — Land of the free, home of the polygons (refined Day 2)
            ctx.beginPath();
            ctx.moveTo(120, 120);
            ctx.lineTo(180, 95);
            ctx.lineTo(245, 105);
            ctx.lineTo(265, 135);
            ctx.lineTo(255, 185);
            ctx.lineTo(235, 205);
            ctx.lineTo(205, 222);
            ctx.lineTo(175, 255);
            ctx.lineTo(155, 235);
            ctx.lineTo(125, 195);
            ctx.lineTo(95, 175);
            ctx.lineTo(82, 145);
            ctx.closePath();
            ctx.fill();

            // SOUTH AMERICA
            ctx.beginPath();
            ctx.moveTo(220, 260);
            ctx.lineTo(260, 270);
            ctx.lineTo(280, 320);
            ctx.lineTo(270, 380);
            ctx.lineTo(250, 425);
            ctx.lineTo(228, 435);
            ctx.lineTo(205, 395);
            ctx.lineTo(198, 340);
            ctx.lineTo(215, 285);
            ctx.closePath();
            ctx.fill();

            // EUROPE
            ctx.beginPath();
            ctx.moveTo(480, 100);
            ctx.lineTo(540, 92);
            ctx.lineTo(562, 108);
            ctx.lineTo(552, 145);
            ctx.lineTo(518, 165);
            ctx.lineTo(485, 152);
            ctx.lineTo(470, 130);
            ctx.closePath();
            ctx.fill();

            // AFRICA
            ctx.beginPath();
            ctx.moveTo(480, 180);
            ctx.lineTo(540, 167);
            ctx.lineTo(585, 195);
            ctx.lineTo(595, 255);
            ctx.lineTo(575, 325);
            ctx.lineTo(530, 365);
            ctx.lineTo(495, 355);
            ctx.lineTo(465, 295);
            ctx.lineTo(458, 230);
            ctx.lineTo(470, 195);
            ctx.closePath();
            ctx.fill();

            // ASIA — The largest, the most complex (Day 2 refinement)
            ctx.beginPath();
            ctx.moveTo(560, 78);
            ctx.lineTo(705, 65);
            ctx.lineTo(785, 92);
            ctx.lineTo(825, 135);
            ctx.lineTo(805, 185);
            ctx.lineTo(760, 205);
            ctx.lineTo(695, 225);
            ctx.lineTo(645, 205);
            ctx.lineTo(595, 175);
            ctx.lineTo(575, 130);
            ctx.closePath();
            ctx.fill();

            // INDIA
            ctx.beginPath();
            ctx.moveTo(640, 220);
            ctx.lineTo(682, 218);
            ctx.lineTo(675, 275);
            ctx.lineTo(645, 295);
            ctx.lineTo(625, 265);
            ctx.closePath();
            ctx.fill();

            // AUSTRALIA
            ctx.beginPath();
            ctx.moveTo(760, 320);
            ctx.lineTo(840, 308);
            ctx.lineTo(865, 345);
            ctx.lineTo(845, 390);
            ctx.lineTo(785, 400);
            ctx.lineTo(760, 365);
            ctx.closePath();
            ctx.fill();

            // ANTARCTICA
            ctx.fillStyle = '#e8e8e8';
            ctx.beginPath();
            ctx.moveTo(0, 470);
            ctx.lineTo(1024, 470);
            ctx.lineTo(1024, 512);
            ctx.lineTo(0, 512);
            ctx.closePath();
            ctx.fill();

            // GREENLAND
            ctx.fillStyle = '#a8d4a8';
            ctx.beginPath();
            ctx.moveTo(320, 60);
            ctx.lineTo(370, 52);
            ctx.lineTo(385, 85);
            ctx.lineTo(355, 115);
            ctx.lineTo(320, 95);
            ctx.closePath();
            ctx.fill();

            // Mountain ranges
            ctx.fillStyle = '#6b5344';
            // Rockies
            drawMountainRange(ctx, 160, 155, 32, 42);
            // Andes
            drawMountainRange(ctx, 230, 315, 18, 82);
            // Himalayas
            drawMountainRange(ctx, 665, 182, 55, 18);
            // Alps
            drawMountainRange(ctx, 512, 125, 23, 10);

            // Deserts
            ctx.fillStyle = '#c4a35a';
            ctx.beginPath();
            ctx.ellipse(520, 205, 45, 28, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(595, 205, 22, 17, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(810, 350, 28, 23, 0, 0, Math.PI * 2);
            ctx.fill();

            // Create the texture from our divine canvas
            const earthTexture = new THREE.CanvasTexture(textureCanvas);
            earthTexture.wrapS = THREE.RepeatWrapping;

            // The Geometry: 64 segments of spherical perfection
            const earthGeometry = new THREE.SphereGeometry(1, 64, 64);

            // The Material: Phong for that classic 3D look (enhanced on Day 2)
            const earthMaterial = new THREE.MeshPhongMaterial({
                map: earthTexture,
                shininess: 28,
                specular: new THREE.Color(0x446677)
            });

            // THE EARTH IS BORN (again, but better)
            earth = new THREE.Mesh(earthGeometry, earthMaterial);
            earthGroup.add(earth);

            // ═══════════════════════════════════════════════════════════
            // THE ATMOSPHERE — A glowing halo of life
            // ═══════════════════════════════════════════════════════════
            const atmosphereGeometry = new THREE.SphereGeometry(1.02, 64, 64);
            const atmosphereMaterial = new THREE.ShaderMaterial({
                vertexShader: `
                    varying vec3 vNormal;
                    varying vec3 vPosition;
                    void main() {
                        vNormal = normalize(normalMatrix * normal);
                        vPosition = (modelViewMatrix * vec4(position, 1.0)).xyz;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    varying vec3 vNormal;
                    varying vec3 vPosition;
                    void main() {
                        // Calculate rim lighting (atmosphere glow)
                        vec3 viewDirection = normalize(-vPosition);
                        float rim = 1.0 - max(0.0, dot(viewDirection, vNormal));
                        rim = pow(rim, 3.0);
                        
                        // Blue atmospheric glow
                        vec3 atmosphereColor = vec3(0.3, 0.6, 1.0);
                        gl_FragColor = vec4(atmosphereColor, rim * 0.6);
                    }
                `,
                transparent: true,
                side: THREE.BackSide,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            atmosphere = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
            earthGroup.add(atmosphere);

            // Apply the sacred axial tilt
            earthGroup.rotation.z = 23.5 * Math.PI / 180;

            scene.add(earthGroup);
        }

        // Helper function: Draw mountain ranges
        function drawMountainRange(ctx, x, y, width, height) {
            ctx.beginPath();
            ctx.ellipse(x, y, width, height, 0, 0, Math.PI * 2);
            ctx.fill();
        }

        // ═══════════════════════════════════════════════════════════════
        // THE CLOUDS — A veil of white upon the firmament (Day 2)
        // ═══════════════════════════════════════════════════════════════
        function createClouds() {
            const cloudCanvas = document.createElement('canvas');
            cloudCanvas.width = 1024;
            cloudCanvas.height = 512;
            const ctx = cloudCanvas.getContext('2d');

            // Transparent background
            ctx.clearRect(0, 0, 1024, 512);

            // Draw many fluffy cloud clusters
            ctx.fillStyle = '#f8f8f8';
            for (let i = 0; i < 42; i++) {
                const x = Math.random() * 1024;
                const y = Math.random() * 380 + 55;
                const size = 32 + Math.random() * 68;
                ctx.globalAlpha = 0.28 + Math.random() * 0.45;

                // Main cloud body
                ctx.beginPath();
                ctx.ellipse(x, y, size, size * 0.55, Math.random() * 0.6 - 0.3, 0, Math.PI * 2);
                ctx.fill();

                // Secondary puffs for realism
                ctx.beginPath();
                ctx.ellipse(x + size * 0.55, y - size * 0.25, size * 0.65, size * 0.7, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(x - size * 0.5, y - size * 0.15, size * 0.55, size * 0.6, 0, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1.0;

            const cloudTexture = new THREE.CanvasTexture(cloudCanvas);
            cloudTexture.wrapS = THREE.RepeatWrapping;

            const cloudGeometry = new THREE.SphereGeometry(1.015, 64, 64);
            const cloudMaterial = new THREE.MeshPhongMaterial({
                map: cloudTexture,
                transparent: true,
                opacity: 0.9,
                depthWrite: false,
                shininess: 2
            });

            clouds = new THREE.Mesh(cloudGeometry, cloudMaterial);
            clouds.rotation.z = 23.5 * Math.PI / 180;
            scene.add(clouds);
        }

        // ═══════════════════════════════════════════════════════════════
        // THE ATMOSPHERE — Blue halo surrounding the sphere (Day 2)
        // ═══════════════════════════════════════════════════════════════
        function createAtmosphere() {
            const atmoGeometry = new THREE.SphereGeometry(1.055, 64, 64);
            const atmoMaterial = new THREE.MeshPhongMaterial({
                color: 0x77bbff,
                transparent: true,
                opacity: 0.16,
                side: THREE.BackSide,
                blending: THREE.AdditiveBlending
            });

            atmosphere = new THREE.Mesh(atmoGeometry, atmoMaterial);
            atmosphere.rotation.z = 23.5 * Math.PI / 180;
            scene.add(atmosphere);
        }

        // ═══════════════════════════════════════════════════════════════
        // THE LIGHTS — Let there be illumination
        // ═══════════════════════════════════════════════════════════════
        function createLights() {
            // Ambient light: The gentle glow of the cosmos
            const ambientLight = new THREE.AmbientLight(0x222233);
            scene.add(ambientLight);

            // The Sun: A directional light from the heavens
            const sunLight = new THREE.DirectionalLight(0xffffff, 1.25);
            sunLight.position.set(5, 2, 3);
            scene.add(sunLight);

            // A subtle fill light from the opposite side (the moon's contribution)
            const fillLight = new THREE.DirectionalLight(0x6688ff, 0.18);
            fillLight.position.set(-5, -2, -3);
            scene.add(fillLight);
        }

        // ═══════════════════════════════════════════════════════════════
        // THE ANIMATION LOOP — Now with orbital mechanics!
        // ═══════════════════════════════════════════════════════════════
        function animate() {
            requestAnimationFrame(animate);

            time += 0.01;

            // Rotate the Earth (0.001 radians per frame — dignified)
            earth.rotation.y += 0.0009;

            // Clouds drift at different speed — creates beautiful parallax
            if (clouds) clouds.rotation.y += 0.00115;

            // Atmosphere rotates with the Earth
            if (atmosphere) atmosphere.rotation.y += 0.0009;

            // Gentle camera drift for that cinematic feel
            camera.position.x = Math.sin(time * 0.05) * 0.3;
            camera.position.y = Math.cos(time * 0.03) * 0.2;
            camera.lookAt(0, 0, 0);

            // Very slow star rotation
            stars.rotation.y += 0.00005;

            renderer.render(scene, camera);
        }

        // ═══════════════════════════════════════════════════════════════
        // MOON PHASE CALCULATOR — Because details matter
        // ═══════════════════════════════════════════════════════════════
        function updateMoonPhaseDisplay(angle) {
            const normalizedAngle = ((angle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
            const phaseNames = [
                'New Moon',
                'Waxing Crescent',
                'First Quarter',
                'Waxing Gibbous',
                'Full Moon',
                'Waning Gibbous',
                'Last Quarter',
                'Waning Crescent'
            ];
            const phaseIndex = Math.floor((normalizedAngle / (Math.PI * 2)) * 8) % 8;
            document.getElementById('moon-phase').textContent = phaseNames[phaseIndex];
        }

        // ═══════════════════════════════════════════════════════════════
        // RESIZE HANDLER — The divine viewport must adapt
        // ═══════════════════════════════════════════════════════════════
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // ═══════════════════════════════════════════════════════════════
        // BEGIN THE CREATION
        // ═══════════════════════════════════════════════════════════════
        init();

        // Console message for any mortals who dare inspect
        console.log('🌍 THE EARTH — Day 2 of Creation');
        console.log('The clouds gather. The atmosphere shimmers.');
        console.log('Complexity Level: 2 / 100');
    </script>
</body>
</html>
