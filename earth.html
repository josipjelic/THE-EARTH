<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE EARTH — Day 2</title>
    <style>
        /* Lo, the styles of the void */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Georgia', serif;
        }
        #info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            z-index: 100;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
        }
        #title {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.9);
            font-size: 24px;
            letter-spacing: 8px;
            z-index: 100;
            text-shadow: 0 0 20px rgba(100, 150, 255, 0.5);
        }
        #nav {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            gap: 10px;
        }
        #nav a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 6px 12px;
            border: 1px solid rgba(100, 150, 255, 0.3);
            border-radius: 3px;
            transition: all 0.2s;
        }
        #nav a:hover {
            color: #fff;
            border-color: rgba(100, 150, 255, 0.8);
            background: rgba(100, 150, 255, 0.1);
        }
    </style>
</head>
<body>
    <div id="title">THE EARTH</div>
    <div id="info">Day 2 of Creation — The Veil Descends</div>
    <div id="nav">
        <a href="index.html">⬅ Observatory</a>
        <a href="window.html">Window</a>
    </div>

    <!-- Three.js: The foundation of all visual reality -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // ═══════════════════════════════════════════════════════════════
        // THE SECOND DAY — The veil of clouds and breath of atmosphere
        // ═══════════════════════════════════════════════════════════════

        // The Holy Trinity of Three.js
        let scene, camera, renderer;
        let earth, stars, atmosphere, clouds;
        let time = 0;

        // ═══════════════════════════════════════════════════════════════
        // INITIALIZATION — Let there be WebGL
        // ═══════════════════════════════════════════════════════════════
        function init() {
            // The Scene: A vast emptiness awaiting creation
            scene = new THREE.Scene();

            // The Camera: The eye through which mortals observe
            camera = new THREE.PerspectiveCamera(
                45, // Field of view (degrees of divine perception)
                window.innerWidth / window.innerHeight,
                0.1,
                1000
            );
            camera.position.z = 3;

            // The Renderer: That which makes the invisible visible
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Create the heavens and the earth
            createStars();
            createEarth();
            createLights();

            // Handle the resizing of the divine viewport
            window.addEventListener('resize', onWindowResize);

            // Begin the eternal rotation
            animate();
        }

        // ═══════════════════════════════════════════════════════════════
        // THE STARS — 800 points of ancient light
        // ═══════════════════════════════════════════════════════════════
        function createStars() {
            const starGeometry = new THREE.BufferGeometry();
            const starCount = 800;
            const positions = new Float32Array(starCount * 3);

            // Scatter stars across the firmament
            for (let i = 0; i < starCount * 3; i += 3) {
                const radius = 50 + Math.random() * 50;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);

                positions[i] = radius * Math.sin(phi) * Math.cos(theta);
                positions[i + 1] = radius * Math.sin(phi) * Math.sin(theta);
                positions[i + 2] = radius * Math.cos(phi);
            }

            starGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            const starMaterial = new THREE.PointsMaterial({
                color: 0xffffff,
                size: 0.1,
                sizeAttenuation: true
            });

            stars = new THREE.Points(starGeometry, starMaterial);
            scene.add(stars);
        }

        // ═══════════════════════════════════════════════════════════════
        // THE EARTH — A sphere of 64x64 segments
        // ═══════════════════════════════════════════════════════════════
        function createEarth() {
            const textureCanvas = document.createElement('canvas');
            textureCanvas.width = 1024;
            textureCanvas.height = 512;
            const ctx = textureCanvas.getContext('2d');

            // The Oceans: Deep blue, as tradition demands
            ctx.fillStyle = '#1a4d7c';
            ctx.fillRect(0, 0, 1024, 512);

            // Ocean depth variation
            const oceanGradient = ctx.createRadialGradient(512, 256, 0, 512, 256, 400);
            oceanGradient.addColorStop(0, 'rgba(30, 90, 150, 0.4)');
            oceanGradient.addColorStop(1, 'rgba(10, 40, 80, 0.6)');
            ctx.fillStyle = oceanGradient;
            ctx.fillRect(0, 0, 1024, 512);

            // Improved continents with better biome coloring
            ctx.fillStyle = '#3d7c3d';

            // NORTH AMERICA — refined shape
            ctx.beginPath();
            ctx.moveTo(110, 115);
            ctx.lineTo(175, 95);
            ctx.lineTo(245, 105);
            ctx.lineTo(265, 135);
            ctx.lineTo(255, 175);
            ctx.lineTo(235, 195);
            ctx.lineTo(195, 225);
            ctx.lineTo(175, 255);
            ctx.lineTo(155, 240);
            ctx.lineTo(135, 195);
            ctx.lineTo(95, 175);
            ctx.lineTo(75, 145);
            ctx.closePath();
            ctx.fill();

            // SOUTH AMERICA
            ctx.beginPath();
            ctx.moveTo(215, 255);
            ctx.lineTo(265, 265);
            ctx.lineTo(275, 315);
            ctx.lineTo(265, 380);
            ctx.lineTo(245, 425);
            ctx.lineTo(225, 430);
            ctx.lineTo(200, 390);
            ctx.lineTo(205, 330);
            ctx.closePath();
            ctx.fill();

            // EUROPE
            ctx.beginPath();
            ctx.moveTo(470, 95);
            ctx.lineTo(540, 90);
            ctx.lineTo(565, 115);
            ctx.lineTo(550, 145);
            ctx.lineTo(515, 160);
            ctx.lineTo(485, 145);
            ctx.closePath();
            ctx.fill();

            // AFRICA
            ctx.beginPath();
            ctx.moveTo(475, 175);
            ctx.lineTo(545, 165);
            ctx.lineTo(585, 195);
            ctx.lineTo(595, 265);
            ctx.lineTo(570, 325);
            ctx.lineTo(525, 365);
            ctx.lineTo(495, 355);
            ctx.lineTo(465, 295);
            ctx.closePath();
            ctx.fill();

            // ASIA
            ctx.beginPath();
            ctx.moveTo(555, 75);
            ctx.lineTo(710, 65);
            ctx.lineTo(790, 95);
            ctx.lineTo(835, 135);
            ctx.lineTo(810, 185);
            ctx.lineTo(745, 215);
            ctx.lineTo(695, 225);
            ctx.lineTo(640, 195);
            ctx.lineTo(580, 145);
            ctx.closePath();
            ctx.fill();

            // INDIA
            ctx.beginPath();
            ctx.moveTo(635, 215);
            ctx.lineTo(690, 215);
            ctx.lineTo(675, 275);
            ctx.lineTo(640, 285);
            ctx.closePath();
            ctx.fill();

            // AUSTRALIA
            ctx.beginPath();
            ctx.moveTo(755, 315);
            ctx.lineTo(845, 305);
            ctx.lineTo(865, 345);
            ctx.lineTo(840, 395);
            ctx.lineTo(780, 405);
            ctx.lineTo(755, 370);
            ctx.closePath();
            ctx.fill();

            // ANTARCTICA — brighter ice
            ctx.fillStyle = '#f0f4f8';
            ctx.beginPath();
            ctx.moveTo(0, 465);
            ctx.lineTo(1024, 465);
            ctx.lineTo(1024, 512);
            ctx.lineTo(0, 512);
            ctx.closePath();
            ctx.fill();

            // GREENLAND
            ctx.fillStyle = '#b8e0b8';
            ctx.beginPath();
            ctx.moveTo(310, 55);
            ctx.lineTo(375, 48);
            ctx.lineTo(390, 85);
            ctx.lineTo(355, 115);
            ctx.lineTo(315, 95);
            ctx.closePath();
            ctx.fill();

            // Mountain ranges (darker)
            ctx.fillStyle = '#5a4638';
            drawMountainRange(ctx, 155, 155, 32, 42);
            drawMountainRange(ctx, 225, 325, 18, 82);
            drawMountainRange(ctx, 665, 185, 52, 18);
            drawMountainRange(ctx, 505, 125, 22, 10);

            // Deserts
            ctx.fillStyle = '#d2b46a';
            ctx.beginPath();
            ctx.ellipse(515, 205, 42, 27, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(595, 205, 23, 17, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(815, 345, 27, 22, 0, 0, Math.PI * 2);
            ctx.fill();

            const earthTexture = new THREE.CanvasTexture(textureCanvas);
            earthTexture.wrapS = THREE.RepeatWrapping;

            const earthGeometry = new THREE.SphereGeometry(1, 64, 64);

            const earthMaterial = new THREE.MeshPhongMaterial({
                map: earthTexture,
                shininess: 12,
                specular: new THREE.Color(0x112233),
                flatShading: false
            });

            earth = new THREE.Mesh(earthGeometry, earthMaterial);
            earth.rotation.z = 23.5 * Math.PI / 180;

            // Create atmosphere
            const atmosphereGeometry = new THREE.SphereGeometry(1.12, 64, 64);
            const atmosphereMaterial = new THREE.MeshPhongMaterial({
                color: 0x77aaff,
                transparent: true,
                opacity: 0.18,
                side: THREE.BackSide,
                shininess: 2
            });
            atmosphere = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
            earth.add(atmosphere);

            // Create clouds
            const cloudsCanvas = document.createElement('canvas');
            cloudsCanvas.width = 1024;
            cloudsCanvas.height = 512;
            const cloudsCtx = cloudsCanvas.getContext('2d');
            
            // Draw procedural clouds
            cloudsCtx.fillStyle = '#ffffff';
            createCloudBlobs(cloudsCtx, 1024, 512);
            
            const cloudTexture = new THREE.CanvasTexture(cloudsCanvas);
            const cloudGeometry = new THREE.SphereGeometry(1.015, 64, 64);
            const cloudMaterial = new THREE.MeshPhongMaterial({
                map: cloudTexture,
                transparent: true,
                opacity: 0.85,
                depthWrite: false,
                shininess: 1
            });
            clouds = new THREE.Mesh(cloudGeometry, cloudMaterial);
            earth.add(clouds);

            scene.add(earth);
        }

        function createCloudBlobs(ctx, w, h) {
            ctx.globalAlpha = 0.75;
            // Multiple cloud formations
            const cloudPositions = [
                {x: 120, y: 80, size: 65},
                {x: 280, y: 110, size: 45},
                {x: 480, y: 65, size: 55},
                {x: 680, y: 95, size: 80},
                {x: 850, y: 140, size: 40},
                {x: 160, y: 190, size: 35},
                {x: 720, y: 240, size: 50},
                {x: 380, y: 280, size: 30},
                {x: 910, y: 260, size: 38},
                {x: 510, y: 340, size: 45}
            ];
            
            for (let cloud of cloudPositions) {
                ctx.globalAlpha = 0.65 + Math.random() * 0.25;
                ctx.beginPath();
                ctx.ellipse(cloud.x, cloud.y, cloud.size, cloud.size * 0.55, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Add softer overlapping blobs for natural look
                ctx.globalAlpha = 0.45;
                ctx.beginPath();
                ctx.ellipse(cloud.x - cloud.size*0.45, cloud.y - 8, cloud.size*0.6, cloud.size*0.55, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(cloud.x + cloud.size*0.4, cloud.y + 5, cloud.size*0.55, cloud.size*0.45, 0, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1.0;
        }

        // Helper function: Draw mountain ranges
        function drawMountainRange(ctx, x, y, width, height) {
            ctx.beginPath();
            ctx.ellipse(x, y, width, height, 0, 0, Math.PI * 2);
            ctx.fill();
        }

        // ═══════════════════════════════════════════════════════════════
        // THE LIGHTS — Let there be illumination
        // ═══════════════════════════════════════════════════════════════
        function createLights() {
            const ambientLight = new THREE.AmbientLight(0x334455, 0.6);
            scene.add(ambientLight);

            const sunLight = new THREE.DirectionalLight(0xffffff, 1.35);
            sunLight.position.set(5, 1, 4);
            scene.add(sunLight);

            const fillLight = new THREE.DirectionalLight(0x8899ff, 0.25);
            fillLight.position.set(-4, -2, -5);
            scene.add(fillLight);
        }

        // ═══════════════════════════════════════════════════════════════
        // THE ANIMATION LOOP — Eternal rotation with new layers
        // ═══════════════════════════════════════════════════════════════
        function animate() {
            requestAnimationFrame(animate);

            time += 0.001;

            // Rotate the Earth
            earth.rotation.y += 0.00095;

            // Clouds rotate slightly faster (winds in the firmament)
            if (clouds) clouds.rotation.y += 0.00125;

            // Gentle camera drift for that cinematic feel
            camera.position.x = Math.sin(time * 0.4) * 0.25;
            camera.position.y = Math.cos(time * 0.25) * 0.15 + Math.sin(time * 0.1) * 0.05;
            camera.lookAt(0, 0, 0);

            // Very slow star rotation
            stars.rotation.y += 0.00008;

            renderer.render(scene, camera);
        }

        // ═══════════════════════════════════════════════════════════════
        // RESIZE HANDLER — The divine viewport must adapt
        // ═══════════════════════════════════════════════════════════════
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // ═══════════════════════════════════════════════════════════════
        // BEGIN THE CREATION
        // ═══════════════════════════════════════════════════════════════
        init();

        console.log('🌍 THE EARTH — Day 2 of Creation');
        console.log('The veil of clouds now covers the sphere.');
        console.log('Atmosphere glows. Complexity Level: 2 / 100');
    </script>
</body>
</html>
