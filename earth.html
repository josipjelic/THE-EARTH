<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE EARTH</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Georgia', serif;
        }
        #info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.65);
            font-size: 13px;
            z-index: 100;
            line-height: 1.6;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.9);
        }
        #title {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.9);
            font-size: 24px;
            letter-spacing: 8px;
            z-index: 100;
            text-shadow: 0 0 20px rgba(100, 150, 255, 0.6);
            pointer-events: none;
        }
        #nav {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            gap: 10px;
        }
        #nav a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 6px 12px;
            border: 1px solid rgba(100, 150, 255, 0.3);
            border-radius: 3px;
            transition: all 0.2s;
        }
        #nav a:hover {
            color: #fff;
            border-color: rgba(100, 150, 255, 0.8);
            background: rgba(100, 150, 255, 0.1);
        }
        #instructions {
            position: absolute;
            top: 65px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 11px;
            letter-spacing: 2px;
            z-index: 100;
            pointer-events: none;
        }
        #season-badge {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: rgba(180, 220, 255, 0.6);
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            z-index: 100;
            text-shadow: 0 0 8px rgba(100, 150, 255, 0.5);
        }
    </style>
</head>
<body>
    <div id="title">THE EARTH</div>
    <div id="info">Loading…</div>
    <div id="instructions">DRAG TO ROTATE &nbsp;•&nbsp; THE MOON ORBITS</div>
    <div id="nav">
        <a href="index.html">⬅ Observatory</a>
        <a href="window.html">Window</a>
    </div>
    <div id="season-badge"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer;
        let earth, stars, atmosphere, clouds, moon, sun;
        let earthMaterial, atmosphereMaterial;
        let time = 0;
        let isDragging = false;
        let previousMouseX = 0;

        const VERT_ATMOSPHERE = `
            varying vec3 vNormal;
            varying vec3 vWorldPos;
            void main() {
                vNormal = normalize((modelMatrix * vec4(normal, 0.0)).xyz);
                vWorldPos = (modelMatrix * vec4(position, 1.0)).xyz;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        const FRAG_ATMOSPHERE = `
            uniform vec3 cameraPos;
            varying vec3 vNormal;
            varying vec3 vWorldPos;
            void main() {
                vec3 toCamera = normalize(cameraPos - vWorldPos);
                float rim = 1.0 - abs(dot(toCamera, vNormal));
                rim = pow(rim, 2.8);
                vec3 innerColor = vec3(0.25, 0.55, 1.0);
                vec3 outerColor = vec3(0.1, 0.75, 1.0);
                vec3 color = mix(innerColor, outerColor, rim);
                gl_FragColor = vec4(color, rim * 0.75);
            }
        `;

        const VERT_EARTH = `
            varying vec2 vUv;
            varying vec3 vWorldNormal;
            void main() {
                vUv = uv;
                vWorldNormal = normalize((modelMatrix * vec4(normal, 0.0)).xyz);
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        const FRAG_EARTH = `
            uniform sampler2D dayTexture;
            uniform sampler2D nightTexture;
            uniform vec3 sunDirection;
            varying vec2 vUv;
            varying vec3 vWorldNormal;
            void main() {
                vec3 normal = normalize(vWorldNormal);
                float light = dot(normal, normalize(sunDirection));
                float dayMix = 1.0 / (1.0 + exp(-12.0 * light));

                vec3 dayColor = texture2D(dayTexture, vUv).rgb;
                vec3 nightColor = texture2D(nightTexture, vUv).rgb;

                float diffuse = max(light, 0.0);
                vec3 litDay = dayColor * (0.28 + diffuse * 0.95);
                vec3 litNight = nightColor * (0.22 + pow(1.0 - clamp(light, -1.0, 1.0), 2.2) * 0.55);
                float twilightBand = smoothstep(-0.18, 0.02, light) * (1.0 - smoothstep(0.02, 0.2, light));
                vec3 twilight = vec3(0.95, 0.35, 0.08) * twilightBand * 0.18;

                vec3 color = mix(litNight, litDay, dayMix) + twilight;
                gl_FragColor = vec4(color, 1.0);
            }
        `;

        function init() {
            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 3;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            createStars();
            createEarth();
            createMoon();
            createSun();
            createLights();
            updateSeasonBadge();

            window.addEventListener('resize', onWindowResize);
            document.addEventListener('mousedown', onMouseDown);
            document.addEventListener('mouseup', onMouseUp);
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseleave', onMouseUp);

            animate();
        }

        function createStars() {
            const starGeometry = new THREE.BufferGeometry();
            const starCount = 2000;
            const positions = new Float32Array(starCount * 3);
            const sizes = new Float32Array(starCount);

            for (let i = 0; i < starCount; i++) {
                const radius = 60 + Math.random() * 80;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                positions[i * 3]     = radius * Math.sin(phi) * Math.cos(theta);
                positions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
                positions[i * 3 + 2] = radius * Math.cos(phi);
                sizes[i] = 0.05 + Math.random() * 0.1;
            }

            starGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            stars = new THREE.Points(starGeometry, new THREE.PointsMaterial({
                color: 0xffffff,
                size: 0.08,
                sizeAttenuation: true,
                transparent: true,
                opacity: 0.85
            }));
            scene.add(stars);
        }

        function createSun() {
            const sunGeometry = new THREE.SphereGeometry(0.22, 32, 32);
            sun = new THREE.Mesh(sunGeometry, new THREE.MeshBasicMaterial({ color: 0xffeebb }));
            sun.position.set(9, 3, 8);
            scene.add(sun);

            const glowGeometry = new THREE.SphereGeometry(0.38, 32, 32);
            const sunGlow = new THREE.Mesh(glowGeometry, new THREE.MeshBasicMaterial({
                color: 0xffdd88,
                transparent: true,
                opacity: 0.18,
                blending: THREE.AdditiveBlending
            }));
            sun.add(sunGlow);
        }

        function createMoon() {
            const moonCanvas = document.createElement('canvas');
            moonCanvas.width = 512;
            moonCanvas.height = 512;
            const ctx = moonCanvas.getContext('2d');

            ctx.fillStyle = '#c0c0c0';
            ctx.fillRect(0, 0, 512, 512);

            const craters = [
                [140, 150, 48], [310, 130, 35], [380, 280, 55],
                [190, 340, 27], [420, 410, 22], [95, 410, 18],
                [260, 420, 31], [450, 200, 15], [180, 240, 12]
            ];
            craters.forEach(([x, y, r]) => {
                ctx.fillStyle = '#a0a0a0';
                ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#b8b8b8';
                ctx.beginPath(); ctx.arc(x - r * 0.3, y - r * 0.3, r * 0.6, 0, Math.PI * 2); ctx.fill();
            });

            moon = new THREE.Mesh(
                new THREE.SphereGeometry(0.27, 48, 48),
                new THREE.MeshPhongMaterial({ map: new THREE.CanvasTexture(moonCanvas), shininess: 2, specular: 0x222222 })
            );
            scene.add(moon);
        }

        function createEarth() {
            const textureCanvas = document.createElement('canvas');
            textureCanvas.width = 1024;
            textureCanvas.height = 512;
            const ctx = textureCanvas.getContext('2d');

            // Base ocean
            const oceanGrad = ctx.createLinearGradient(0, 0, 0, 512);
            oceanGrad.addColorStop(0, '#0c223f');
            oceanGrad.addColorStop(0.5, '#1e5a9e');
            oceanGrad.addColorStop(1, '#0c223f');
            ctx.fillStyle = oceanGrad;
            ctx.fillRect(0, 0, 1024, 512);

            // Latitude tint for seasonal changes; updated for more realistic temperature gradient
            const latGrad = ctx.createLinearGradient(0, 60, 0, 452);
            latGrad.addColorStop(0,   'rgba(255,255,255,0.35)'); // arctic ice
            latGrad.addColorStop(0.1, 'rgba(180,220,240,0.22)');
            latGrad.addColorStop(0.2, 'rgba(70,150,85,0.15)');  // Spring
            latGrad.addColorStop(0.5, 'rgba(45,125,65,0.12)');  // Summer
            latGrad.addColorStop(0.8, 'rgba(70,150,85,0.15)');  // Autumn
            latGrad.addColorStop(0.9,   'rgba(240,200,90,0.18)'); // Deserts
            latGrad.addColorStop(1,   'rgba(255,255,255,0.35)'); // antarctic ice
            ctx.fillStyle = latGrad;
            ctx.fillRect(0, 0, 1024, 512);

            ctx.fillStyle = '#2a6b2a';

            // North America
            ctx.beginPath();
            ctx.moveTo(100, 105); ctx.quadraticCurveTo(145, 82, 195, 95);
            ctx.lineTo(255, 118); ctx.quadraticCurveTo(275, 155, 235, 215);
            ctx.lineTo(165, 255); ctx.quadraticCurveTo(115, 215, 85, 145);
            ctx.closePath(); ctx.fill();

            // South America
            ctx.beginPath();
            ctx.moveTo(200, 255); ctx.quadraticCurveTo(245, 265, 265, 305);
            ctx.lineTo(255, 390); ctx.quadraticCurveTo(235, 435, 205, 415);
            ctx.lineTo(198, 310); ctx.closePath(); ctx.fill();

            // Europe + Asia
            ctx.beginPath();
            ctx.moveTo(445, 88); ctx.lineTo(535, 78); ctx.lineTo(720, 55);
            ctx.lineTo(815, 105); ctx.lineTo(855, 165); ctx.lineTo(795, 215);
            ctx.lineTo(685, 235); ctx.lineTo(625, 185); ctx.lineTo(575, 165);
            ctx.lineTo(505, 105); ctx.closePath(); ctx.fill();

            // Africa
            ctx.beginPath();
            ctx.moveTo(460, 170); ctx.lineTo(560, 165); ctx.lineTo(595, 195);
            ctx.lineTo(605, 275); ctx.lineTo(565, 370); ctx.lineTo(495, 365);
            ctx.lineTo(465, 295); ctx.closePath(); ctx.fill();

            // India
            ctx.beginPath();
            ctx.moveTo(635, 210); ctx.quadraticCurveTo(685, 200, 710, 225);
            ctx.quadraticCurveTo(730, 255, 675, 280); ctx.closePath(); ctx.fill();

            // Australia
            ctx.beginPath();
            ctx.moveTo(780, 320); ctx.quadraticCurveTo(850, 295, 890, 325);
            ctx.quadraticCurveTo(875, 385, 805, 405); ctx.quadraticCurveTo(765, 385, 760, 350);
            ctx.closePath(); ctx.fill();

            // Islands
            ctx.fillRect(795, 185, 18, 22);
            ctx.beginPath(); ctx.ellipse(865, 245, 14, 32, Math.PI * -0.3, 0, Math.PI * 2); ctx.fill();

            // Antarctica
            ctx.fillStyle = '#e8f0f8';
            ctx.beginPath(); ctx.ellipse(512, 480, 460, 65, 0, 0, Math.PI * 2); ctx.fill();

            // Greenland
            ctx.fillStyle = '#c8e0c8';
            ctx.beginPath();
            ctx.moveTo(310, 62); ctx.lineTo(365, 48); ctx.lineTo(395, 75);
            ctx.lineTo(375, 115); ctx.lineTo(320, 105); ctx.closePath(); ctx.fill();

            // Mountains
            ctx.fillStyle = '#444a3a';
            [[145, 148, 38, 26], [215, 318, 21, 55], [685, 142, 68, 22],
             [520, 115, 26, 14], [775, 148, 19, 9]].forEach(([x, y, w, h]) => {
                ctx.beginPath(); ctx.ellipse(x, y, w, h, 0, 0, Math.PI * 2); ctx.fill();
            });

            // Deserts - Make them yellower
            ctx.fillStyle = '#d4b46a';
            [[505, 225, 48, 26, 0], [610, 208, 32, 19, 0.3], [825, 355, 29, 19, 0]].forEach(([x, y, rx, ry, rot]) => {
                ctx.beginPath(); ctx.ellipse(x, y, rx, ry, rot, 0, Math.PI * 2); ctx.fill();
            });

           // Rivers!
            ctx.strokeStyle = '#163b5d';
            ctx.lineWidth = 2;

            const rivers = [
                [ [160,150], [150,170], [130,190], [90,210] ], // Rockies to Mississippi
                [ [220,300], [230,320], [240,350], [245,380] ], // Andes to Amazon
                [ [700,120], [680,140], [650,160], [600,170] ], // Himalayas to Ganges
                [ [480,100], [500,120], [520,140], [540,150] ]  // Alps to Danube
            ];

            rivers.forEach(river => {
                ctx.beginPath();
                ctx.moveTo(river[0][0], river[0][1]);
                for (let i = 1; i < river.length; i++) {
                    ctx.lineTo(river[i][0], river[i][1]);
                }
                ctx.stroke();
            });

            const earthTexture = new THREE.CanvasTexture(textureCanvas);
            earthTexture.wrapS = THREE.RepeatWrapping;

            // City lights now feed the Earth's night texture for a real terminator.
            const lightsCanvas = document.createElement('canvas');
            lightsCanvas.width = 1024;
            lightsCanvas.height = 512;
            const lctx = lightsCanvas.getContext('2d');
            lctx.fillStyle = '#000000';
            lctx.fillRect(0, 0, 1024, 512);
            drawCityLights(lctx);
            const nightTexture = new THREE.CanvasTexture(lightsCanvas);
            nightTexture.wrapS = THREE.RepeatWrapping;

            const earthGeometry = new THREE.SphereGeometry(1, 64, 64);
            earthMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    dayTexture: { value: earthTexture },
                    nightTexture: { value: nightTexture },
                    sunDirection: { value: new THREE.Vector3(1, 0.25, 0.8).normalize() }
                },
                vertexShader: VERT_EARTH,
                fragmentShader: FRAG_EARTH
            });

            earth = new THREE.Mesh(earthGeometry, earthMaterial);
            earth.rotation.z = 23.5 * Math.PI / 180;
            scene.add(earth);

            // Clouds
            const cloudsCanvas = document.createElement('canvas');
            cloudsCanvas.width = 1024;
            cloudsCanvas.height = 512;
            const cloudsCtx = cloudsCanvas.getContext('2d');
            cloudsCtx.fillStyle = '#ffffff';
            drawCloudBlobs(cloudsCtx);

            clouds = new THREE.Mesh(
                new THREE.SphereGeometry(1.018, 64, 64),
                new THREE.MeshPhongMaterial({
                    map: new THREE.CanvasTexture(cloudsCanvas),
                    transparent: true,
                    opacity: 0.75,
                    depthWrite: false,
                    shininess: 1
                })
            );
            earth.add(clouds);

            // Fresnel atmosphere shell — using GLSL shader for realistic edge glow
            atmosphereMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    cameraPos: { value: new THREE.Vector3() }
                },
                vertexShader: VERT_ATMOSPHERE,
                fragmentShader: FRAG_ATMOSPHERE,
                side: THREE.BackSide,
                blending: THREE.AdditiveBlending,
                transparent: true,
                depthWrite: false
            });
            atmosphere = new THREE.Mesh(new THREE.SphereGeometry(1.18, 64, 64), atmosphereMaterial);
            earth.add(atmosphere);
        }

        function drawCityLights(ctx) {
            const cities = [
                { x: 301, y: 139, r: 5 },  // New York
                { x: 263, y: 136, r: 4 },  // Chicago
                { x: 177, y: 159, r: 4 },  // Los Angeles
                { x: 230, y: 201, r: 4 },  // Mexico City
                { x: 220, y: 148, r: 3 },  // Philadelphia / DC
                { x: 284, y: 181, r: 3 },  // Miami
                { x: 285, y: 131, r: 3 },  // Toronto
                { x: 154, y: 145, r: 3 },  // San Francisco
                { x: 512, y: 109, r: 5 },  // London
                { x: 517, y: 117, r: 4 },  // Paris
                { x: 550, y: 106, r: 4 },  // Berlin
                { x: 548, y: 138, r: 3 },  // Rome
                { x: 619, y:  98, r: 5 },  // Moscow
                { x: 594, y: 139, r: 4 },  // Istanbul
                { x: 644, y: 156, r: 3 },  // Baghdad
                { x: 714, y: 202, r: 4 },  // Mumbai
                { x: 843, y: 144, r: 5 },  // Beijing
                { x: 930, y: 299, r: 4 },  // Sydney
            ];

            cities.forEach(c => {
                const grad = ctx.createRadialGradient(c.x, c.y, 0, c.x, c.y, c.r * 4);
                grad.addColorStop(0,   `rgba(255, 210, 130, ${0.85 + Math.random() * 0.15})`);
                grad.addColorStop(0.4, 'rgba(255, 190, 90, 0.5)');
                grad.addColorStop(1,   'rgba(255, 180, 60, 0)');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(c.x, c.y, c.r * 4, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function drawCloudBlobs(ctx) {
            const cloudPositions = [
                { x: 110, y: 75, size: 72 }, { x: 290, y: 95, size: 51 },
                { x: 470, y: 55, size: 68 }, { x: 710, y: 88, size: 88 },
                { x: 860, y: 135, size: 44 }, { x: 155, y: 205, size: 39 },
                { x: 680, y: 255, size: 61 }, { x: 390, y: 295, size: 33 },
                { x: 920, y: 275, size: 29 }, { x: 530, y: 355, size: 52 },
                { x: 200, y: 320, size: 45 }, { x: 760, y: 180, size: 38 }
            ];
            cloudPositions.forEach(cloud => {
                ctx.globalAlpha = 0.65 + Math.random() * 0.25;
                ctx.beginPath();
                ctx.ellipse(cloud.x, cloud.y, cloud.size, cloud.size * 0.52, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 0.38;
                ctx.beginPath();
                ctx.ellipse(cloud.x - cloud.size * 0.4, cloud.y - 12, cloud.size * 0.65, cloud.size * 0.45, 0, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1.0;
        }

        function createLights() {
            scene.add(new THREE.AmbientLight(0x334455, 0.5));
            const sunLight = new THREE.DirectionalLight(0xffffff, 1.5);
            sunLight.position.set(8, 2, 7);
            scene.add(sunLight);
            const fillLight = new THREE.DirectionalLight(0x8899cc, 0.25);
            fillLight.position.set(-6, -3, -7);
            scene.add(fillLight);
        }

        function updateSeasonBadge() {
            const month = new Date().getMonth();
            const seasons = ['Winter', 'Winter', 'Spring', 'Spring', 'Spring',
                             'Summer', 'Summer', 'Summer', 'Autumn', 'Autumn', 'Autumn', 'Winter'];
            document.getElementById('season-badge').textContent = seasons[month];
        }

        function onMouseDown(e) { isDragging = true; previousMouseX = e.clientX; }
        function onMouseUp()    { isDragging = false; }
        function onMouseMove(e) {
            if (!isDragging || !earth) return;
            earth.rotation.y += (e.clientX - previousMouseX) * 0.0045;
            previousMouseX = e.clientX;
        }

        function animate() {
            requestAnimationFrame(animate);
            time += 0.0012;

            if (!isDragging && earth) earth.rotation.y += 0.00095;
            if (clouds) clouds.rotation.y += 0.00135;

            const drift = 0.22;
            camera.position.x = Math.sin(time * 0.35) * drift;
            camera.position.y = Math.cos(time * 0.28) * 0.13 + Math.sin(time * 0.11) * 0.07;
            camera.lookAt(0, 0, 0);

            // Pass current camera world position to atmosphere Fresnel shader
            if (atmosphereMaterial) {
                atmosphereMaterial.uniforms.cameraPos.value.copy(camera.position);
            }
            if (earthMaterial && sun) {
                earthMaterial.uniforms.sunDirection.value.copy(sun.position).normalize();
            }

            if (moon) {
                const a = time * 0.0028;
                moon.position.set(Math.cos(a) * 3.8, Math.sin(a * 0.6) * 0.8, Math.sin(a) * 3.5);
                moon.rotation.y = time * 0.4;
            }

            if (stars) stars.rotation.y += 0.00005;

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        init();

        fetch('earth/state.json').then(r => r.json()).then(s => {
            const day = s.earth?.day ?? s.day ?? 1;
            const complexity = s.earth?.complexity_level ?? s.complexityLevel ?? 1;
            const phase = s.phase ?? 'Genesis';
            document.getElementById('info').innerHTML =
                'Day ' + day + ' of Creation' +
                '<br><span style="font-size:11px;color:rgba(255,255,255,0.4);">Complexity ' + complexity + '/100 &nbsp;·&nbsp; ' + phase + ' Phase</span>';
            document.title = 'THE EARTH — Day ' + day;
        }).catch(() => {
            document.getElementById('info').textContent = 'THE EARTH';
        });
    </script>
</body>
</html>
