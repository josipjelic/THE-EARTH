<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Earth — Day 1 | The Self-Evolving Earth</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000005;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      color: #aef;
    }
    #canvas-container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    canvas { display: block; }
    #overlay {
      position: fixed;
      bottom: 24px;
      left: 24px;
      background: rgba(0,10,30,0.7);
      border: 1px solid rgba(100,180,255,0.3);
      border-radius: 8px;
      padding: 16px 20px;
      font-size: 12px;
      line-height: 1.8;
      backdrop-filter: blur(8px);
      max-width: 280px;
    }
    #overlay h3 {
      font-size: 14px;
      color: #6af;
      margin-bottom: 8px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .metric { display: flex; justify-content: space-between; gap: 16px; }
    .metric-label { color: #789; }
    .metric-value { color: #aef; font-weight: bold; }
    #day-badge {
      position: fixed;
      top: 24px;
      right: 24px;
      background: rgba(0,20,60,0.8);
      border: 1px solid rgba(100,180,255,0.4);
      border-radius: 50px;
      padding: 8px 20px;
      font-size: 13px;
      letter-spacing: 1px;
      color: #8cf;
      backdrop-filter: blur(8px);
    }
    #title {
      position: fixed;
      top: 24px;
      left: 24px;
      font-size: 22px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #4af;
      text-shadow: 0 0 20px rgba(100,200,255,0.5);
    }
    #subtitle {
      position: fixed;
      top: 54px;
      left: 24px;
      font-size: 10px;
      letter-spacing: 2px;
      color: #456;
      text-transform: uppercase;
    }
    #stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
  </style>
</head>
<body>

<canvas id="stars"></canvas>
<div id="canvas-container"></div>
<div id="title">EARTH</div>
<div id="subtitle">Genesis — Day 1 — Self-Evolving Simulation</div>
<div id="day-badge">DAY 1 / ∞</div>
<div id="overlay">
  <h3>Earth Metrics</h3>
  <div class="metric"><span class="metric-label">Complexity</span><span class="metric-value" id="m-complexity">1 / 100</span></div>
  <div class="metric"><span class="metric-label">Rotation</span><span class="metric-value" id="m-rotation">0.1°/s</span></div>
  <div class="metric"><span class="metric-label">Continents</span><span class="metric-value">7</span></div>
  <div class="metric"><span class="metric-label">Atmosphere</span><span class="metric-value" id="m-atmo">none yet</span></div>
  <div class="metric"><span class="metric-label">Phase</span><span class="metric-value">Genesis</span></div>
  <div class="metric"><span class="metric-label">Model</span><span class="metric-value" style="font-size:10px">claude-opus-4-5</span></div>
</div>

<!-- THREE.js — the Sacred Rendering Engine -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ═══════════════════════════════════════════════════════════
// THE EARTH — Day 1
// Forged by THE ARCHITECT on the First Day of Creation
// "And the Architect said: let there be a sphere."
// ═══════════════════════════════════════════════════════════

// --- Stars Background (hand of the Creator scattering light) ---
const starCanvas = document.getElementById('stars');
const starCtx = starCanvas.getContext('2d');
starCanvas.width = window.innerWidth;
starCanvas.height = window.innerHeight;

function drawStars() {
  starCtx.clearRect(0, 0, starCanvas.width, starCanvas.height);
  starCtx.fillStyle = '#000005';
  starCtx.fillRect(0, 0, starCanvas.width, starCanvas.height);
  for (let i = 0; i < 800; i++) {
    const x = Math.random() * starCanvas.width;
    const y = Math.random() * starCanvas.height;
    const r = Math.random() * 1.2;
    const opacity = 0.3 + Math.random() * 0.7;
    starCtx.beginPath();
    starCtx.arc(x, y, r, 0, Math.PI * 2);
    starCtx.fillStyle = `rgba(${180 + Math.random()*75}, ${200 + Math.random()*55}, 255, ${opacity})`;
    starCtx.fill();
  }
}
drawStars();

// --- THREE.js Scene Setup ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
document.getElementById('canvas-container').appendChild(renderer.domElement);

camera.position.z = 3;

// --- The Earth (Genesis Form) ---
// On the First Day, the Earth was a simple sphere with a hand-painted surface.
// No shaders. No data. Just the beginning.

const earthGeo = new THREE.SphereGeometry(1, 64, 64);

// Day 1: Procedurally generated Earth-like texture
// In the beginning, there were no textures. So we make our own.
function createEarthTexture() {
  const size = 2048;
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');

  // Deep ocean base
  ctx.fillStyle = '#0d4f8c';
  ctx.fillRect(0, 0, size, size);

  // Shallow waters
  const shallowGrad = ctx.createRadialGradient(size*0.3, size*0.4, 0, size*0.3, size*0.4, size*0.4);
  shallowGrad.addColorStop(0, 'rgba(30, 120, 180, 0.4)');
  shallowGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
  ctx.fillStyle = shallowGrad;
  ctx.fillRect(0, 0, size, size);

  // Paint rough continents (approximate positions)
  ctx.fillStyle = '#4a7c3f';

  // North America (rough)
  drawContinent(ctx, [
    [0.12,0.18], [0.22,0.12], [0.30,0.15], [0.32,0.28],
    [0.25,0.40], [0.18,0.42], [0.12,0.35], [0.10,0.25]
  ], size);

  // South America (rough)
  drawContinent(ctx, [
    [0.22,0.45], [0.28,0.43], [0.30,0.52], [0.28,0.68],
    [0.22,0.72], [0.18,0.65], [0.19,0.52]
  ], size);

  // Europe
  drawContinent(ctx, [
    [0.46,0.18], [0.54,0.16], [0.56,0.25], [0.52,0.30],
    [0.46,0.28], [0.44,0.22]
  ], size);

  // Africa
  drawContinent(ctx, [
    [0.48,0.32], [0.56,0.30], [0.60,0.40], [0.58,0.58],
    [0.52,0.65], [0.46,0.58], [0.44,0.45], [0.46,0.35]
  ], size);

  // Asia (massive)
  drawContinent(ctx, [
    [0.55,0.15], [0.75,0.12], [0.88,0.18], [0.90,0.30],
    [0.82,0.40], [0.72,0.42], [0.62,0.38], [0.56,0.28], [0.54,0.20]
  ], size);

  // Australia
  drawContinent(ctx, [
    [0.78,0.55], [0.88,0.52], [0.92,0.60], [0.88,0.68],
    [0.78,0.68], [0.74,0.62]
  ], size);

  // Antarctica (polar cap)
  ctx.fillStyle = '#e8f0ff';
  ctx.beginPath();
  ctx.ellipse(size/2, size*0.95, size*0.35, size*0.09, 0, 0, Math.PI*2);
  ctx.fill();

  // Arctic (top polar cap)
  ctx.fillStyle = '#dceeff';
  ctx.beginPath();
  ctx.ellipse(size/2, size*0.03, size*0.28, size*0.06, 0, 0, Math.PI*2);
  ctx.fill();

  // Deserts
  ctx.fillStyle = '#c9a96e';
  ctx.globalAlpha = 0.6;
  ctx.beginPath();
  ctx.ellipse(size*0.52, size*0.36, size*0.06, size*0.04, 0.3, 0, Math.PI*2);
  ctx.fill(); // Sahara
  ctx.beginPath();
  ctx.ellipse(size*0.70, size*0.30, size*0.04, size*0.03, 0, 0, Math.PI*2);
  ctx.fill(); // Arabian
  ctx.globalAlpha = 1.0;

  // Add some terrain noise
  for (let i = 0; i < 3000; i++) {
    const x = Math.random() * size;
    const y = Math.random() * size;
    const r = 1 + Math.random() * 4;
    ctx.globalAlpha = Math.random() * 0.08;
    ctx.fillStyle = Math.random() > 0.5 ? '#2d5a1b' : '#1a3f6e';
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1.0;

  return new THREE.CanvasTexture(canvas);
}

function drawContinent(ctx, points, size) {
  ctx.beginPath();
  ctx.moveTo(points[0][0] * size, points[0][1] * size);
  for (let i = 1; i < points.length; i++) {
    ctx.lineTo(points[i][0] * size, points[i][1] * size);
  }
  ctx.closePath();
  ctx.fill();
}

const earthTexture = createEarthTexture();
const earthMat = new THREE.MeshPhongMaterial({
  map: earthTexture,
  specular: new THREE.Color(0x112244),
  shininess: 15
});

const earth = new THREE.Mesh(earthGeo, earthMat);
scene.add(earth);

// --- Sun Light (the great furnace of the solar system) ---
const sunLight = new THREE.DirectionalLight(0xfff8e7, 1.4);
sunLight.position.set(5, 2, 3);
scene.add(sunLight);

const ambientLight = new THREE.AmbientLight(0x111133, 0.4);
scene.add(ambientLight);

// --- Axial Tilt (23.5° because physics) ---
earth.rotation.z = 23.5 * Math.PI / 180;

// --- Animation Loop ---
let frame = 0;
function animate() {
  requestAnimationFrame(animate);
  frame++;
  
  // Earth rotates on its axis (one full rotation = ~10 min in real time)
  earth.rotation.y += 0.001;
  
  // Gentle camera drift
  camera.position.x = Math.sin(frame * 0.0003) * 0.3;
  camera.position.y = Math.sin(frame * 0.0002) * 0.15;
  camera.lookAt(scene.position);
  
  renderer.render(scene, camera);
}
animate();

// --- Resize Handler ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  starCanvas.width = window.innerWidth;
  starCanvas.height = window.innerHeight;
  drawStars();
});

// --- The Day Counter (grows each day as THE ARCHITECT builds) ---
// This value will be updated by the daily runner
const DAY_NUMBER = 1;
document.getElementById('day-badge').textContent = `DAY ${DAY_NUMBER} / ∞`;

console.log(`
╔═══════════════════════════════════════╗
║     SELF-EVOLVING EARTH — DAY ${DAY_NUMBER}      ║
║   Forged by THE ARCHITECT in Claude   ║
║   "In the beginning was the Sphere"   ║
╚═══════════════════════════════════════╝
`);
</script>
</body>
</html>
