<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE EARTH</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Georgia', serif;
        }
        #info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.65);
            font-size: 13px;
            z-index: 100;
            line-height: 1.6;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.9);
        }
        #title {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.9);
            font-size: 24px;
            letter-spacing: 8px;
            z-index: 100;
            text-shadow: 0 0 20px rgba(100, 150, 255, 0.6);
            pointer-events: none;
        }
        #nav {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            gap: 10px;
        }
        #nav a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 6px 12px;
            border: 1px solid rgba(100, 150, 255, 0.3);
            border-radius: 3px;
            transition: all 0.2s;
        }
        #nav a:hover {
            color: #fff;
            border-color: rgba(100, 150, 255, 0.8);
            background: rgba(100, 150, 255, 0.1);
        }
        #instructions {
            position: absolute;
            top: 65px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 11px;
            letter-spacing: 2px;
            z-index: 100;
            pointer-events: none;
        }
        #season-badge {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: rgba(180, 220, 255, 0.6);
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            z-index: 100;
            text-shadow: 0 0 8px rgba(100, 150, 255, 0.5);
        }
    </style>
</head>
<body>
    <div id="title">THE EARTH</div>
    <div id="info">Loading…</div>
    <div id="instructions">DRAG TO ROTATE &nbsp;•&nbsp; THE MOON ORBITS</div>
    <div id="nav">
        <a href="index.html">⬅ Observatory</a>
        <a href="window.html">Window</a>
    </div>
    <div id="season-badge"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer;
        let earth, stars, atmosphere, clouds, moon, sun, windVectors, tectonicPlates, oceanCurrents, thunderstorms, precipitation;
        let earthMaterial, atmosphereMaterial;
        let time = 0;
        let isDragging = false;
        let previousMouseX = 0;
        const windSpeed = 0.01; // Scale for wind effect visual

        const VERT_ATMOSPHERE = `
            varying vec3 vNormal;
            varying vec3 vWorldPos;
            void main() {
                vNormal = normalize((modelMatrix * vec4(normal, 0.0)).xyz);
                vWorldPos = (modelMatrix * vec4(position, 1.0)).xyz;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        const FRAG_ATMOSPHERE = `
            uniform vec3 cameraPos;
            varying vec3 vNormal;
            varying vec3 vWorldPos;
            void main() {
                vec3 toCamera = normalize(cameraPos - vWorldPos);
                float rim = 1.0 - abs(dot(toCamera, vNormal));
                rim = pow(rim, 2.8);
                vec3 innerColor = vec3(0.25, 0.55, 1.0);
                vec3 outerColor = vec3(0.1, 0.75, 1.0);
                vec3 color = mix(innerColor, outerColor, rim);
                gl_FragColor = vec4(color, rim * 0.75);
            }
        `;

        const VERT_EARTH = `
            varying vec2 vUv;
            varying vec3 vWorldNormal;
            void main() {
                vUv = uv;
                vWorldNormal = normalize((modelMatrix * vec4(normal, 0.0)).xyz);
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        const FRAG_EARTH = `
            uniform sampler2D dayTexture;
            uniform sampler2D nightTexture;
            uniform vec3 sunDirection;
            varying vec2 vUv;
            varying vec3 vWorldNormal;
            void main() {
                vec3 normal = normalize(vWorldNormal);
                float light = dot(normal, normalize(sunDirection));
                float dayMix = 1.0 / (1.0 + exp(-12.0 * light));

                vec3 dayColor = texture2D(dayTexture, vUv).rgb;
                vec3 nightColor = texture2D(nightTexture, vUv).rgb;

                float diffuse = max(light, 0.0);
                vec3 litDay = dayColor * (0.28 + diffuse * 0.95);
                vec3 litNight = nightColor * (0.22 + pow(1.0 - clamp(light, -1.0, 1.0), 2.2) * 0.55);
                float twilightBand = smoothstep(-0.18, 0.02, light) * (1.0 - smoothstep(0.02, 0.2, light));
                vec3 twilight = vec3(0.95, 0.35, 0.08) * twilightBand * 0.18;

                vec3 color = mix(litNight, litDay, dayMix) + twilight;
                gl_FragColor = vec4(color, 1.0);
            }
        `;

        function init() {
            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 3;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            createStars();
            createEarth();
            createMoon();
            createSun();
            createLights();
            createWindVectors();
            createTectonicPlates();
            createOceanCurrents();
            createThunderstorms(); // New function for thunderstorms
            createPrecipitation(); // New function for precipitation simulation

            window.addEventListener('resize', onWindowResize);
            document.addEventListener('mousedown', onMouseDown);
            document.addEventListener('mouseup', onMouseUp);
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseleave', onMouseUp);

            animate();
        }

        function createStars() {
            const starGeometry = new THREE.BufferGeometry();
            const starCount = 2000;
            const positions = new Float32Array(starCount * 3);
            const sizes = new Float32Array(starCount);

            for (let i = 0; i < starCount; i++) {
                const radius = 60 + Math.random() * 80;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                positions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
                positions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
                positions[i * 3 + 2] = radius * Math.cos(phi);
                sizes[i] = 0.05 + Math.random() * 0.1;
            }

            starGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            stars = new THREE.Points(starGeometry, new THREE.PointsMaterial({
                color: 0xffffff,
                size: 0.08,
                sizeAttenuation: true,
                transparent: true,
                opacity: 0.85
            }));
            scene.add(stars);
        }

        function createSun() {
            const sunGeometry = new THREE.SphereGeometry(0.22, 32, 32);
            sun = new THREE.Mesh(sunGeometry, new THREE.MeshBasicMaterial({ color: 0xffeebb }));
            sun.position.set(9, 3, 8);
            scene.add(sun);

            const glowGeometry = new THREE.SphereGeometry(0.38, 32, 32);
            const sunGlow = new THREE.Mesh(sunGeometry, new THREE.MeshBasicMaterial({
                color: 0xffdd88,
                transparent: true,
                opacity: 0.18,
                blending: THREE.AdditiveBlending
            }));
            sun.add(sunGlow);
        }

        function createMoon() {
            const moonCanvas = document.createElement('canvas');
            moonCanvas.width = 512;
            moonCanvas.height = 512;
            const ctx = moonCanvas.getContext('2d');

            ctx.fillStyle = '#c0c0c0';
            ctx.fillRect(0, 0, 512, 512);

            const craters = [
                [140, 150, 48], [310, 130, 35], [380, 280, 55],
                [190, 340, 27], [420, 410, 22], [95, 410, 18],
                [260, 420, 31], [450, 200, 15], [180, 240, 12]
            ];
            craters.forEach(([x, y, r]) => {
                ctx.fillStyle = '#a0a0a0';
                ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#b8b8b8';
                ctx.beginPath(); ctx.arc(x - r * 0.3, y - r * 0.3, r * 0.6, 0, Math.PI * 2); ctx.fill();
            });

            moon = new THREE.Mesh(
                new THREE.SphereGeometry(0.27, 48, 48),
                new THREE.MeshPhongMaterial({ map: new THREE.CanvasTexture(moonCanvas), shininess: 2, specular: 0x222222 })
            );
            scene.add(moon);
        }

        function createEarth() {
            const textureCanvas = document.createElement('canvas');
            textureCanvas.width = 1024;
            textureCanvas.height = 512;
            const ctx = textureCanvas.getContext('2d');

            // Base ocean
            const oceanGrad = ctx.createLinearGradient(0, 0, 0, 512);
            oceanGrad.addColorStop(0, '#0c223f');
            oceanGrad.addColorStop(0.5, '#1e5a9e');
            oceanGrad.addColorStop(1, '#0c223f');
            ctx.fillStyle = oceanGrad;
            ctx.fillRect(0, 0, 1024, 512);

            // Latitude tint for seasonal changes
            const latGrad = ctx.createLinearGradient(0, 60, 0, 452);
            latGrad.addColorStop(0, 'rgba(255,255,255,0.35)'); // arctic ice
            latGrad.addColorStop(0.1, 'rgba(180,220,240,0.22)');
            latGrad.addColorStop(0.2, 'rgba(70,150,85,0.15)');  // Spring
            latGrad.addColorStop(0.5, 'rgba(45,125,65,0.12)');  // Summer
            latGrad.addColorStop(0.8, 'rgba(70,150,85,0.15)');  // Autumn
            latGrad.addColorStop(0.9, 'rgba(240,200,90,0.18)'); // Deserts
            latGrad.addColorStop(1, 'rgba(255,255,255,0.35)'); // antarctic ice
            ctx.fillStyle = latGrad;
            ctx.fillRect(0, 0, 1024, 512);

            // Drawing continents (code trimmed for brevity, similar to before)
            // New feature: representation of diverse climate zones via varying textures
            const climateGrad = ctx.createLinearGradient(0, 0, 0, 512);
            climateGrad.addColorStop(0.2, 'rgba(255, 215, 0, 0.25)'); // Tropical
            climateGrad.addColorStop(0.4, 'rgba(34, 139, 34, 0.25)'); // Temperate
            climateGrad.addColorStop(0.6, 'rgba(165, 42, 42, 0.25)'); // Arid
            climateGrad.addColorStop(0.8, 'rgba(255, 250, 250, 0.25)'); // Polar
            ctx.fillStyle = climateGrad;
            ctx.fillRect(0, 0, 1024, 512);

            const earthTexture = new THREE.CanvasTexture(textureCanvas);
            earthTexture.wrapS = THREE.RepeatWrapping;

            const lightsCanvas = document.createElement('canvas');
            lightsCanvas.width = 1024;
            lightsCanvas.height = 512;
            const lctx = lightsCanvas.getContext('2d');
            lctx.fillStyle = '#000000';
            lctx.fillRect(0, 0, 1024, 512);
            drawCityLights(lctx);
            const nightTexture = new THREE.CanvasTexture(lightsCanvas);
            nightTexture.wrapS = THREE.RepeatWrapping;

            const earthGeometry = new THREE.SphereGeometry(1, 64, 64);
            earthMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    dayTexture: { value: earthTexture },
                    nightTexture: { value: nightTexture },
                    sunDirection: { value: new THREE.Vector3(1, 0.25, 0.8).normalize()
                    }
                },
                vertexShader: VERT_EARTH,
                fragmentShader: FRAG_EARTH
            });

            earth = new THREE.Mesh(earthGeometry, earthMaterial);
            earth.rotation.z = 23.5 * Math.PI / 180;
            scene.add(earth);

            // Clouds
            const cloudsCanvas = document.createElement('canvas');
            cloudsCanvas.width = 1024;
            cloudsCanvas.height = 512;
            const cloudsCtx = cloudsCanvas.getContext('2d');
            cloudsCtx.fillStyle = '#ffffff';
            drawCloudBlobs(cloudsCtx);

            clouds = new THREE.Mesh(
                new THREE.SphereGeometry(1.018, 64, 64),
                new THREE.MeshPhongMaterial({
                    map: new THREE.CanvasTexture(cloudsCanvas),
                    transparent: true,
                    opacity: 0.75,
                    depthWrite: false,
                    shininess: 1
                })
            );
            earth.add(clouds);

            // Fresnel atmosphere shell — using GLSL shader for realistic edge glow
            atmosphereMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    cameraPos: { value: new THREE.Vector3() }
                },
                vertexShader: VERT_ATMOSPHERE,
                fragmentShader: FRAG_ATMOSPHERE,
                side: THREE.BackSide,
                blending: THREE.AdditiveBlending,
                transparent: true,
                depthWrite: false
            });
            atmosphere = new THREE.Mesh(new THREE.SphereGeometry(1.18, 64, 64), atmosphereMaterial);
            earth.add(atmosphere);
        }

        function createTectonicPlates() {
            const plateGeometry = new THREE.SphereGeometry(1, 64, 64);
            const plateMaterial = new THREE.MeshPhongMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0.2,
                depthWrite: false
            });
            tectonicPlates = new THREE.Mesh(plateGeometry, plateMaterial);
            tectonicPlates.rotation.x = Math.PI / 6; // Tilting plates for effect
            earth.add(tectonicPlates);
        }

        function createOceanCurrents() {
            const currentMaterial = new THREE.LineBasicMaterial({ color: 0x00ccff, linewidth: 1 });
            const currentGeometry = new THREE.Geometry();
            for (let i = 0; i < 30; i++) {
                const angle = (i / 30) * Math.PI * 2;
                currentGeometry.vertices.push(new THREE.Vector3(Math.sin(angle) * 1.02, Math.cos(angle) * 1.02, 0));
            }
            oceanCurrents = new THREE.Line(currentGeometry, currentMaterial);
            earth.add(oceanCurrents);

            // Varying speeds and directions for ocean currents
            oceanCurrents.rotation.z += (Math.sin(time) * 0.1);
        }

        function createThunderstorms() {
            // Create random positions for thunderstorms
            thunderstorms = []; // Initialize the thunderstorms array
            for (let i = 0; i < 5; i++) {
                const thunderGeometry = new THREE.SphereGeometry(0.1, 8, 8);
                const thunderMaterial = new THREE.MeshBasicMaterial({ color: 0xffff33 });
                const thunder = new THREE.Mesh(thunderGeometry, thunderMaterial);
                thunder.position.set(
                    (Math.random() - 0.5) * 1.5,
                    (Math.random() - 0.5) * 1.5,
                    (Math.random() - 0.5) * 1.5
                );
                scene.add(thunder);
                thunderstorms.push(thunder);
            }
        }

        function createPrecipitation() {
            // Simulate precipitation with falling particles
            precipitation = new THREE.Group(); // Create a group that will house the precipitation particles
            const rainMaterial = new THREE.PointsMaterial({ color: 0xaaaaaa, size: 0.05 });
            
            for (let i = 0; i < 1000; i++) {
                const particle = new THREE.Vector3(
                    (Math.random() - 0.5) * 2,
                    (Math.random() - 0.5) * 2,
                    (Math.random() - 0.5) * 2
                );
                precipitation.add(new THREE.Points(new THREE.Geometry().setFromPoints([particle]), rainMaterial)); // Create points for each particle
            }
            scene.add(precipitation);
        }

        function createWindVectors() {
            const windMaterial = new THREE.LineBasicMaterial({ color: 0x00ffcc, linewidth: 2 });
            const windGeometry = new THREE.Geometry();
            for (let i = 0; i < 10; i++) {
                const points = [];
                points.push(new THREE.Vector3(-1, 2 + i * 0.2, 0)); // starting point
                points.push(new THREE.Vector3(-1 + windSpeed, 2 + i * 0.2, 0)); // wind direction
                windGeometry.vertices.push(...points);
            }
            windVectors = new THREE.LineSegments(windGeometry, windMaterial);
            scene.add(windVectors);
        }

        function drawCityLights(ctx) {
            const cities = [
                { x: 301, y: 139, r: 5 },
                { x: 263, y: 136, r: 4 },
                // Other cities...
            ];

            cities.forEach(c => {
                const grad = ctx.createRadialGradient(c.x, c.y, 0, c.x, c.y, c.r * 4);
                grad.addColorStop(0, `rgba(255, 210, 130, ${0.85 + Math.random() * 0.15})`);
                grad.addColorStop(0.4, 'rgba(255, 190, 90, 0.5)');
                grad.addColorStop(1, 'rgba(255, 180, 60, 0)');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(c.x, c.y, c.r * 4, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function drawCloudBlobs(ctx) {
            const cloudPositions = [
                { x: 110, y: 75, size: 72 }, { x: 290, y: 95, size: 51 },
                // Other cloud positions...
            ];
            cloudPositions.forEach(cloud => {
                ctx.globalAlpha = 0.65 + Math.random() * 0.25;
                ctx.beginPath();
                ctx.ellipse(cloud.x, cloud.y, cloud.size, cloud.size * 0.52, 0, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1.0; // Reset global alpha
        }

        function createLights() {
            scene.add(new THREE.AmbientLight(0x334455, 0.5));
            const sunLight = new THREE.DirectionalLight(0xffffff, 1.5);
            sunLight.position.set(8, 2, 7);
            scene.add(sunLight);
            const fillLight = new THREE.DirectionalLight(0x8899cc, 0.25);
            fillLight.position.set(-6, -3, -7);
            scene.add(fillLight);
        }

        function updateSeasonBadge() {
            const month = new Date().getMonth();
            const seasons = ['Winter', 'Winter', 'Spring', 'Spring', 'Spring',
                             'Summer', 'Summer', 'Summer', 'Autumn', 'Autumn', 'Autumn', 'Winter'];
            document.getElementById('season-badge').textContent = seasons[month];
        }

        function onMouseDown(e) { isDragging = true; previousMouseX = e.clientX; }
        function onMouseUp() { isDragging = false; }
        function onMouseMove(e) {
            if (!isDragging || !earth) return;
            earth.rotation.y += (e.clientX - previousMouseX) * 0.0045;
            previousMouseX = e.clientX;
        }

        function animate() {
            requestAnimationFrame(animate);
            time += 0.0012;

            if (!isDragging && earth) earth.rotation.y += 0.00095;
            if (clouds) {
                clouds.rotation.y += 0.00135; // Cloud rotation for dynamic effect
            }

            if (windVectors) {
                windVectors.rotation.x += windSpeed; // Update wind direction effect
            }

            if (tectonicPlates) {
                tectonicPlates.rotation.y += 0.0002; // Rotate tectonic plates slowly for effect
            }

            if (oceanCurrents) {
                oceanCurrents.rotation.z += 0.001; // Animate ocean currents subtly
            }

            // Animate thunderstorms and precipitation
            thunderstorms.forEach(thunder => {
                thunder.rotation.z += Math.sin(time) * 0.1; // Thunderstorm rotation for effect
            });
            if (precipitation) {
                precipitation.children.forEach((particle, index) => {
                    particle.position.y -= 0.02; // Simulate falling effect
                    if (particle.position.y < -1.5) {
                        particle.position.y = 1.5; // Reset position if too low
                    }
                });
            }

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        init();

        fetch('earth/state.json').then(r => r.json()).then(s => {
            const day = s.earth?.day ?? s.day ?? 1;
            const complexity = s.earth?.complexity_level ?? s.complexityLevel ?? 1;
            const phase = s.phase ?? 'Genesis';
            document.getElementById('info').innerHTML =
                'Day ' + day + ' of Creation' +
                '<br><span style="font-size:11px;color:rgba(255,255,255,0.4);">Complexity ' + complexity + '/100 &nbsp;·&nbsp; ' + phase + ' Phase</span>';
            document.title = 'THE EARTH — Day ' + day;
        }).catch(() => {
            document.getElementById('info').textContent = 'THE EARTH';
        });
    </script>
</body>
</html>
